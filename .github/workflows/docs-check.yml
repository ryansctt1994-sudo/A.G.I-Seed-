name: Docs Check

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    name: Markdown hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Markdown lint
        run: |
          cat > .markdownlint-cli2.yaml <<'YAML'
          config:
            MD013: false
            MD024: false
            MD033: false
          globs:
            - "**/*.md"
          ignores:
            - "node_modules"
          YAML
          npx --yes markdownlint-cli2

      - name: Link check
        run: |
          find . -name "*.md" -not -path "./node_modules/*" -print0 \
            | xargs -0 -n 1 npx --yes markdown-link-check --quiet

      - name: Advisory spell check
        continue-on-error: true
        run: |
          cat > cspell.json <<'JSON'
          {
            "version": "0.2",
            "language": "en",
            "words": [
              "AGI",
              "Aphoph",
              "CANON",
              "Chronicle",
              "DMSI",
              "EchoGenesis",
              "Harmonia",
              "Symmind",
              "Weaver",
              "gVisor",
              "roadmap",
              "subsystems"
            ],
            "ignorePaths": [
              "node_modules",
              ".git"
            ]
          }
          JSON
          npx --yes cspell "**/*.md"
